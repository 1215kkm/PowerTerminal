<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>PowerTerminal</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%9A%80%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<style>
  :root {
    --bg: #111827; --panel: #1f2937; --line: #374151;
    --violet: #7C3AED; --pink: #EC4899; --green: #22c55e; --sky: #38bdf8;
    --fg: #e5e7eb; --muted: #9ca3af;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--fg);
         font-family: Pretendard, 'Malgun Gothic', -apple-system, sans-serif;
         touch-action: pan-x pan-y; }   /* 더블탭/핀치 확대 방지 (앱처럼) */
  button, select { touch-action: manipulation; }
  header { display: flex; align-items: center; gap: 10px; padding: 10px 14px;
           border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--bg); z-index: 50; }
  header h1 { font-size: 16px; margin: 0;
              background: linear-gradient(90deg, var(--violet), var(--pink));
              -webkit-background-clip: text; background-clip: text; color: transparent; }
  header .sp { flex: 1; }
  .logo-wrap { position: relative; display: inline-flex; align-items: center; gap: 10px; }
  button { border: 0; border-radius: 8px; background: #374151; color: var(--fg);
           padding: 8px 12px; cursor: pointer; font-size: 13px; font-family: inherit; }
  button.primary { background: linear-gradient(90deg, var(--violet), var(--pink)); font-weight: 700; }
  button.small { padding: 4px 8px; font-size: 12px; }

  #grid { display: grid; gap: 10px; padding: 10px;
          grid-template-columns: repeat(auto-fit, minmax(min(480px, 100%), 1fr));
          transition: grid-template-columns .35s ease; }
  .pane { background: var(--panel); border: 2px solid var(--line); border-radius: 12px;
          display: flex; flex-direction: column; overflow: hidden; min-height: 340px;
          transition: border-color .3s; }
  .pane.busy { border-color: var(--sky); }                    /* 작업 중(하늘색) */
  .pane.done { border-color: var(--green);                    /* 전부 완료(초록·2배 두께 — outline이라 레이아웃 안 흔들림) */
               outline: 2px solid var(--green);
               box-shadow: 0 0 14px rgba(34,197,94,.55); }
  .pane.dragging { opacity: .4; }
  .pane.dragover { outline: 2px dashed var(--pink); }
  /* 번호 밑 '완료' 초록 배지 */
  .numwrap { display: inline-flex; flex-direction: column; align-items: center; gap: 2px; flex: 0 0 auto; }
  .donebadge { display: none; font-size: 9px; font-weight: 700; color: #06230f;
               background: var(--green); border-radius: 4px; padding: 1px 5px; line-height: 1.3; }
  .pane.done .donebadge { display: block; }

  .pane-head { display: flex; flex-direction: column; gap: 3px; padding: 6px 8px;
               background: #111827; border-bottom: 1px solid var(--line); cursor: grab; }
  .ph-top { display: flex; align-items: center; gap: 6px; }
  .ph-bottom { display: flex; align-items: center; gap: 8px; }
  .ph-bottom .folder { flex: 1; }
  .pane-head .num { min-width: 22px; height: 22px; border-radius: 6px; font-size: 12px; font-weight: 700;
                    display: flex; align-items: center; justify-content: center; flex: 0 0 auto;
                    background: linear-gradient(135deg, var(--violet), var(--pink)); color: #fff; }
  .pane-head .title { font-weight: 700; font-size: 14px; cursor: text; padding: 2px 4px; border-radius: 4px;
                      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pane-head .title:hover { background: #374151; }
  .pane-head input.title-edit { font: inherit; font-weight: 700; background: #374151; color: #fff;
                                border: 1px solid var(--violet); border-radius: 4px; padding: 2px 4px; width: 40%; }
  .pane-head .folder { font-size: 11px; color: var(--muted); overflow: hidden;
                       text-overflow: ellipsis; white-space: nowrap; }
  .pane-head .modelSel { background: #1f2937; border: 1px solid var(--line); color: var(--fg);
                         border-radius: 6px; padding: 3px 6px; font-size: 12px; font-family: inherit; }
  .pane-head .st { font-size: 11px; flex: 0 0 auto; }
  .pane-body { flex: 1; position: relative; min-height: 220px; }
  .term { position: absolute; inset: 0; padding: 4px; }
  iframe.preview { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background: #fff; }
  .hidden { display: none !important; }

  /* 확대(포커스): 그 칸의 열만 넓어짐 (위치 유지) — 버튼 강조 */
  .pane.maxed .btnMax { background: linear-gradient(135deg, var(--violet), var(--pink)); color: #fff; }
  .quick .qImg { flex: 0 0 auto; display: inline-flex; align-items: center; justify-content: center; }
  .quick .qImg svg { display: block; }

  .quick { display: flex; gap: 6px; padding: 6px 8px; border-top: 1px solid var(--line); background: #111827;
           align-items: flex-end; }
  .quick textarea { flex: 1; background: #000; border: 1px solid var(--line); color: var(--fg);
                    border-radius: 8px; padding: 9px 10px; font-size: 14px; font-family: inherit;
                    resize: none; max-height: 34vh; overflow-y: auto; line-height: 1.45; }
  .quick textarea:focus { outline: 1px solid var(--violet); }
  #btnFeedback { display: none !important; }   /* 의견보내기 버튼 — 일단 숨김 */
  .ub-left { font-size: 10px; color: var(--muted); white-space: nowrap; }   /* 리셋까지 남은 시간 */
  #btnQR .qric { vertical-align: -2px; }

  /* 배너 효과 엔진 — banner.json의 effect 필드로 원격 제어 (none/blink/pulse/glow/shake/slide/rainbow) */
  @keyframes fxBlink { 0%, 100% { opacity: 1; } 50% { opacity: .25; } }
  @keyframes fxPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.07); } }
  @keyframes fxGlow { 0%, 100% { box-shadow: 0 0 4px 1px rgba(236,72,153,.5); } 50% { box-shadow: 0 0 16px 5px rgba(236,72,153,.95); } }
  @keyframes fxShake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-2px); } 40% { transform: translateX(2px); } 60% { transform: translateX(-2px); } 80% { transform: translateX(2px); } }
  @keyframes fxSlide { 0% { transform: translateX(110%); } 100% { transform: translateX(-110%); } }
  @keyframes fxRainbow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
  #banner.fx-blink { animation: fxBlink 1.6s ease-in-out infinite; }
  #banner.fx-pulse { animation: fxPulse 1.4s ease-in-out infinite; }
  #banner.fx-glow { animation: fxGlow 1.6s ease-in-out infinite; }
  #banner.fx-shake { animation: fxShake 1s ease-in-out infinite; }
  #banner.fx-rainbow { animation: fxRainbow 4s linear infinite; }
  #banner.fx-slide .bn-in { display: inline-block; animation: fxSlide 9s linear infinite; }
  /* 모바일: 터미널 중앙 1/3 = 터미널 스크롤백 존 · 양옆 = 페이지 스크롤 */
  .scrollzone, .pgzone { display: none; }

  dialog { background: var(--panel); color: var(--fg); border: 1px solid var(--line);
           border-radius: 12px; max-width: 92vw; width: 460px; }
  dialog::backdrop { background: rgba(0,0,0,.6); }
  dialog h3 { margin: 0 0 10px; }
  dialog .proj { display: block; width: 100%; text-align: left; margin: 4px 0; }
  .atab { background: #374151; }
  .atab.on { background: linear-gradient(90deg, var(--violet), var(--pink)); font-weight: 700; }
  .brfolder { background: #111827; border: 1px solid var(--line); border-radius: 8px; padding: 8px 6px;
              font-size: 12px; cursor: pointer; text-align: center; overflow: hidden;
              white-space: nowrap; text-overflow: ellipsis; }
  .brfolder:hover { border-color: var(--violet); }
  .pick-card { position: relative; border: 2px solid var(--line); border-radius: 10px; padding: 12px 10px;
               cursor: pointer; background: #111827; transition: border-color .2s, background .2s; }
  .pick-card.sel { border-color: var(--pink); background: rgba(236,72,153,.12); }
  .pick-card .pk-title { font-weight: 700; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pick-card .pk-path { font-size: 10px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 3px; }
  .pick-card.pk-recent { opacity: .6; }
  .pick-card.pk-recent.sel { opacity: 1; }
  /* 카드 우측상단 3개 아이콘 (폴더열기·빼기·중복) — 평소 숨김, 호버 시 표시, 박스 안 정중앙 */
  .card-icons { position: absolute; top: 6px; right: 6px; display: flex; gap: 4px; opacity: 0; transition: opacity .15s; z-index: 3; }
  .pick-card:hover .card-icons, .mini-pane:hover .card-icons { opacity: 1; }
  .card-icons button { width: 22px; height: 22px; padding: 0; display: inline-flex; align-items: center; justify-content: center;
                       background: #374151; border: 0; border-radius: 6px; color: var(--fg); cursor: pointer; }
  .card-icons button:hover { background: var(--violet); color: #fff; }
  .card-icons .ci-del:hover { background: #b91c1c; }
  .card-icons svg { width: 13px; height: 13px; display: block; }
  @media (pointer: coarse) { .card-icons { opacity: 1; } }   /* 터치 기기(폰·Mac 트랙패드 탭)에선 항상 표시 */
  dialog input { width: 100%; background: #111827; border: 1px solid var(--line); color: var(--fg);
                 border-radius: 8px; padding: 9px 10px; margin: 4px 0; font-family: inherit; }

  /* 세션 추가창: 이전 세션을 분할화면 축소판(미니 창)처럼 표시 */
  .known-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
  .mini-pane { border: 2px solid var(--line); border-radius: 10px; overflow: hidden; cursor: pointer;
               background: #111827; transition: border-color .15s, transform .1s; }
  .mini-pane:hover { border-color: var(--violet); transform: translateY(-1px); }
  .mp-head { display: flex; align-items: center; gap: 6px; padding: 5px 7px;
             background: #1f2937; border-bottom: 1px solid var(--line); }
  .mp-num { min-width: 18px; height: 18px; border-radius: 5px; font-size: 11px; font-weight: 700;
            display: flex; align-items: center; justify-content: center; flex: 0 0 auto;
            background: linear-gradient(135deg, var(--violet), var(--pink)); color: #fff; }
  .mp-title { font-size: 12px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mp-body { padding: 12px 7px; font-size: 10px; color: var(--muted); min-height: 34px;
             overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mp-on { margin-left: auto; color: var(--green); font-size: 10px; flex: 0 0 auto; }
  .mini-pane.on { border-color: var(--violet); background: #1c2740; }   /* 열려 있는 세션 = 밝게 */
  .mini-pane.on .mp-head { background: #253352; }
  .mini-pane.on .mp-title { color: #fff; }
  .mini-pane.off { opacity: .45; filter: grayscale(.75); }        /* 안 쓰는 세션 회색 */
  .mini-pane.off:hover { opacity: 1; filter: none; border-color: var(--green); }
  /* 모바일: 열린 세션은 얇은 한 줄 (번호+제목만, 본문 숨김) */
  .mini-pane.mp-slim .mp-body { display: none; }
  .mini-pane.mp-slim .mp-head { padding: 8px 10px; }
  .mini-pane.mp-slim { border-radius: 8px; }

  /* 상단 사용량 막대 (공식 사용량 화면과 같은 %) */
  #usage { display: flex; gap: 14px; align-items: center; }
  .ub { display: inline-flex; align-items: center; gap: 6px; }
  .ub-label { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .ub-track { width: 90px; height: 6px; border-radius: 3px; background: #374151; overflow: hidden; }
  .ub-fill { display: block; height: 100%; border-radius: 3px; transition: width .6s; }
  .ub-pct { font-size: 11px; font-weight: 700; color: var(--fg); }
  @media (max-width: 700px), (pointer: coarse) and (max-height: 520px) {
    /* 헤더 3줄 구성: ①로고+QR+언어  ②배너  ③세션%+추가버튼  ④주간%+주간Fable% */
    header { flex-wrap: wrap; row-gap: 7px; }
    .logo-wrap { order: 0; display: inline-block; }   /* 폭=로고 글자 폭 → 배지 오른쪽 끝 기준 */
    #hverBadge { position: absolute; right: 0; bottom: 100%; margin-bottom: 1px; }   /* 로고 우측 끝 바로 위 */
    header .sp { order: 2; }
    #btnQR { order: 3; }
    #btnPick { order: 3; }
    #langSel { order: 4; padding: 6px; font-size: 12px; min-width: 0; }
    #banner { order: 5; max-width: 100% !important; width: 100%; text-align: center; }
    #usage { display: contents; }          /* 사용량 막대들을 헤더 줄배치에 직접 참여시킴 */
    .ub { min-width: 0; }
    .ub-session { order: 6; flex: 1 1 52%; }
    #btnAdd { order: 7; margin-left: auto; }
    .ub-weekly_all { order: 8; flex: 1 1 50%; }
    .ub-weekly_scoped { order: 9; flex: 1 1 38%; margin-left: auto; }
    .ub-weekly_all .ub-left, .ub-weekly_scoped .ub-left { display: none; }  /* 폰: 주간 막대들의 ⏳시간 숨김 (세션만 표시) */
    /* 폰: 현재세션 자리에서 [세션 그래프] ↔ [$비용] 이 5초마다 교대 표시 (주간 두 개는 계속) */
    .ub-cost { display: none; }
    html.pt-alt .ub-session { display: none; }
    html.pt-alt .ub-cost { display: inline-flex; order: 6; flex: 1 1 52%; }
    .ub-track { flex: 1; min-width: 40px; }
    #btnQR .qrtxt { display: none; }       /* QR 글자 숨기고 아이콘만 */
    /* 모바일 헤더 여유 — 터미널 헤더 두 줄 구조라 자연히 +높이 */
    .pane-head { padding: 8px 10px; gap: 5px; }
    .pane-head .folder { font-size: 12px; }
    .pane-head .modelSel { font-size: 13px; padding: 5px 8px; }
    .btnMax, .btnTasks { display: none; }  /* 폰에선 확대/작업목록 버튼 숨김 */
    /* 이미지 첨부/찾기 버튼 — 폰에서 누르기 쉽게 크게 */
    .quick .qImg { padding: 8px 12px; }
    .quick .qImg svg { width: 20px; height: 20px; }
    .quick .qSend { padding: 8px 12px; }
    /* QR: 폰에선 두 개가 겹치지 않게 위아래로 쌓기 */
    #qrCols { flex-direction: column !important; align-items: center; }
    #qrCols > div { width: 100%; }
    /* 터미널 중앙 1/3 = 그 터미널 스크롤백(위 내용 보기) · 양옆 1/3씩 = 페이지 스크롤 */
    .scrollzone { display: block; position: absolute; left: 33.3%; width: 33.4%; top: 0; bottom: 0;
                  z-index: 5; background: transparent; transition: background .25s; touch-action: none; }
    .pgzone { display: block; position: absolute; top: 0; bottom: 0; width: 33.3%;
              z-index: 5; touch-action: pan-y; }
    .pgzone.l { left: 0; } .pgzone.r { right: 0; }
    .scrollzone.touching { background: rgba(56,189,248,.35); }
    /* 페이지 스크롤 중이면 모든 세션의 가운데 존을 하늘색으로 잠깐 표시 */
    html.pt-scrolling .scrollzone { background: rgba(56,189,248,.2); }
  }

  /* 폰 전용 미니맵: 번호 붙은 제목 탭 — 탭하면 그 작업창으로 이동 (스크롤 고정) */
  #minimap { display: none; }
  @media (max-width: 700px), (pointer: coarse) and (max-height: 520px) {
    #grid { grid-template-columns: 1fr; padding: 6px; }
    .pane { min-height: 55vh; }
    header h1 { font-size: 14px; }
    #minimap { display: flex; flex-wrap: wrap; gap: 5px;
               padding: 6px 8px; position: sticky; top: 0; z-index: 49;
               background: var(--bg); border-bottom: 1px solid var(--line); }
    /* top 값은 JS가 헤더 높이에 맞춰 설정 (헤더가 줄바꿈으로 높이가 변하므로) */
    .mm-cell { display: flex; align-items: center; gap: 5px;
               border: 2px solid var(--line); border-radius: 8px; padding: 5px 9px;
               font-size: 12px; font-weight: 700; cursor: pointer;
               max-width: 46%; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
               background: var(--panel); transition: border-color .2s; }
    .mm-cell .mm-num { flex: 0 0 auto; width: 18px; height: 18px; border-radius: 5px; font-size: 11px;
                       display: flex; align-items: center; justify-content: center; color: #fff;
                       background: linear-gradient(135deg, var(--violet), var(--pink)); }
    .mm-cell .mm-title { overflow: hidden; text-overflow: ellipsis; }
    .mm-cell.active { border-color: var(--pink); }
    .mm-cell.busy { border-color: var(--sky); }
    .mm-cell.done { border-color: var(--green); box-shadow: 0 0 6px rgba(34,197,94,.6); }
    .mm-cell.busy .mm-title::after { content: ' ⋯'; color: var(--sky); }
    /* 폰 확대 모드: 고른 창만 크게, 나머지는 아주 얇게 */
    #grid.maxmode .pane.maxed { min-height: 74vh; }
    #grid.maxmode .pane.mini { min-height: 92px; }
  }
</style>
</head>
<body>
<header>
  <span class="logo-wrap"><h1>🚀 PowerTerminal</h1><span id="hverBadge" style="font-size:10px;color:var(--muted);background:#374151;padding:1px 7px;border-radius:99px"></span></span>
  <a id="banner" target="_blank" rel="noopener"
     style="display:none;font-size:12px;font-weight:700;color:#fff;text-decoration:none;
            padding:5px 12px;border-radius:99px;white-space:nowrap;overflow:hidden;
            text-overflow:ellipsis;max-width:34vw;
            background:linear-gradient(90deg,var(--violet),var(--pink))"></a>
  <span id="usage" style="font-size:12px;color:var(--muted);white-space:nowrap"></span>
  <span class="sp"></span>
  <button id="btnFeedback" onclick="openFeedback()" data-i18n-title="feedback"><span class="fic">✉</span><span class="flbl" data-i18n="feedbackShort">Request</span></button>
  <button id="btnQR" onclick="toggleQR()" data-i18n-title="infoBtn"><svg class="qric" width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M3 3h8v8H3V3zm2 2v4h4V5H5zm1 1h2v2H6V6zm7-3h8v8h-8V3zm2 2v4h4V5h-4zm1 1h2v2h-2V6zM3 13h8v8H3v-8zm2 2v4h4v-4H5zm1 1h2v2H6v-2zm7-3h3v3h-3v-3zm5 0h3v3h-3v-3zm-5 5h3v3h-3v-3zm5 0h3v3h-3v-3z"/></svg><span class="qrtxt"> QR</span></button>
  <select id="langSel" onchange="setLang(this.value)" title="Language"
          style="background:#374151;border:0;color:var(--fg);border-radius:8px;padding:8px;font-family:inherit;font-size:13px">
    <option value="en" data-short="EN" data-full="English">🌐 English</option>
    <option value="ko" data-short="KO" data-full="한국어">🌐 한국어</option>
    <option value="ja" data-short="JA" data-full="日本語">🌐 日本語</option>
    <option value="zh" data-short="ZH" data-full="中文">🌐 中文</option>
    <option value="es" data-short="ES" data-full="Español">🌐 Español</option>
    <option value="de" data-short="DE" data-full="Deutsch">🌐 Deutsch</option>
    <option value="fr" data-short="FR" data-full="Français">🌐 Français</option>
    <option value="pt" data-short="PT" data-full="Português">🌐 Português</option>
    <option value="ru" data-short="RU" data-full="Русский">🌐 Русский</option>
    <option value="hi" data-short="HI" data-full="हिन्दी">🌐 हिन्दी</option>
  </select>
  <button id="btnPick" onclick="openPicker()" data-i18n-title="pickBtn" title="Choose sessions"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></button>
  <button id="btnAdd" class="primary" onclick="openAdd()" data-i18n="addSession">＋ Session</button>
</header>
<div id="minimap"></div>
<div id="grid"></div>

<dialog id="pickDlg" style="width:640px">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
    <h3 data-i18n="pickTitle" style="margin:0;flex:1">▶ Resume sessions</h3>
    <button onclick="pickDlg.close()" style="padding:4px 10px;font-weight:700" title="Close">✕</button>
  </div>
  <p style="font-size:12px;color:var(--muted)" data-i18n="pickDesc">Pick which saved sessions to open. Click to toggle, (−) to remove.</p>
  <div id="pickGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;max-height:46vh;overflow:auto;margin:8px 0"></div>
  <div style="display:flex;gap:8px;justify-content:space-between;align-items:center;margin-top:8px">
    <label style="font-size:12px;color:var(--muted);display:flex;gap:6px;align-items:center;cursor:pointer">
      <input type="checkbox" id="pickAll" onchange="pickToggleAll(this.checked)"> <span data-i18n="pickAll">Select all</span>
    </label>
    <div style="display:flex;gap:8px">
      <button onclick="pickDlg.close()" data-i18n="pickSkip">Skip</button>
      <button onclick="pickDlg.close(); openAdd();" data-i18n="addSession">＋ Session</button>
      <button class="primary" onclick="pickStart()" data-i18n="pickStart">▶ Open selected</button>
    </div>
  </div>
</dialog>

<dialog id="qrDlg" style="width:720px">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
    <h3 data-i18n="qrTitle" style="margin:0;flex:1">📱 Mobile Access</h3>
    <span id="verBadge" style="font-size:11px;color:var(--muted);background:#374151;padding:2px 8px;border-radius:99px"></span>
    <button onclick="qrDlg.close()" style="padding:4px 10px;font-weight:700" title="Close">✕</button>
  </div>
  <!-- 경고 관문: QR을 보기 전에 위험 고지 + 동의 -->
  <div id="qrGate" style="text-align:center;padding:14px 6px">
    <div style="font-size:40px">⚠️</div>
    <p data-i18n="qrGateWarn" style="font-size:14px;line-height:1.6;color:#fca5a5;font-weight:700;margin:10px 4px"></p>
    <p data-i18n="qrGateResp" style="font-size:12px;color:var(--muted);margin:6px 4px 16px"></p>
    <button class="primary" onclick="qrRevealed=true;document.getElementById('qrGate').style.display='none';document.getElementById('qrBody').style.display='block'" data-i18n="qrGateOk" style="padding:10px 18px;font-weight:700">I understand — show the QR</button>
  </div>
  <div id="qrBody" style="display:none">
    <div id="qrCols" style="display:flex;gap:14px"></div>
    <p style="font-size:11px;color:var(--muted);margin-top:10px" data-i18n="qrWarn"></p>
  </div>
</dialog>

<dialog id="addDlg" style="width:600px">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
    <h3 data-i18n="addTitleH" style="margin:0;flex:1">Add Session</h3>
    <button onclick="addDlg.close()" style="padding:4px 10px;font-weight:700" title="Close">✕</button>
  </div>
  <div id="addTabs" style="display:flex;gap:6px;margin-bottom:10px">
    <button class="atab" data-tab="folder" data-i18n="tabFolder">📁 Local folder</button>
    <button class="atab" data-tab="github" data-i18n="tabGithub">🐙 GitHub</button>
    <button class="atab" data-tab="new" data-i18n="tabNew">🆕 New</button>
  </div>

  <!-- 로컬 폴더: 최근 프로젝트 + 폴더 탐색기(격자). 폴더 선택=즉시 추가 -->
  <div id="tab-folder">
    <div id="knownList" style="max-height:32vh;overflow:auto;margin-bottom:8px"></div>
    <div style="display:flex;gap:6px">
      <input id="addPath" data-i18n-ph="pathPh" style="flex:1">
      <button onclick="toggleBrowse()" data-i18n="browse" style="white-space:nowrap">📂 찾아보기</button>
      <button class="primary" onclick="addManual()" data-i18n="add">Add</button>
    </div>
    <div id="browser" style="display:none;border:2px solid var(--sky);border-radius:8px;margin-top:8px">
      <div style="display:flex;gap:6px;align-items:center;padding:6px;border-bottom:1px solid var(--line)">
        <button class="small" onclick="browseUp()">⬆</button>
        <span id="brCur" style="flex:1;font-size:12px;color:var(--muted);word-break:break-all"></span>
        <button class="small primary" onclick="pickCurrent()" data-i18n="selectThis">✔ 이 폴더 선택</button>
      </div>
      <div id="brList" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px;padding:8px;max-height:34vh;overflow:auto"></div>
    </div>
  </div>

  <!-- GitHub 저장소 clone -->
  <div id="tab-github" style="display:none">
    <p style="font-size:12px;color:var(--muted)" data-i18n="ghPick"></p>
    <div id="repoList" style="max-height:34vh;overflow:auto"></div>
    <div style="display:flex;gap:6px;margin-top:8px">
      <input id="cloneUrl" placeholder="https://github.com/user/repo" style="flex:1">
      <button class="primary" onclick="cloneRepo()" data-i18n="cloneBtn">⬇ Clone & Start</button>
    </div>
  </div>

  <!-- 새 프로젝트 -->
  <div id="tab-new" style="display:none">
    <p style="font-size:12px;color:var(--muted)" data-i18n="npDesc"></p>
    <input id="npName" data-i18n-ph="npPh">
    <div style="text-align:right;margin-top:8px">
      <button class="primary" id="npBtn" onclick="newProject()" data-i18n="npGo">Create & Start</button>
    </div>
  </div>

  <hr style="border-color:var(--line);margin:12px 0 8px">
  <div style="display:flex;gap:6px;align-items:center">
    <span style="font-size:12px;color:var(--muted)" data-i18n="aiLabel">AI:</span>
    <select id="addAgent" style="flex:1;background:#111827;border:1px solid var(--line);color:var(--fg);border-radius:8px;padding:7px 10px;font-family:inherit">
      <option value="claude" data-i18n="agClaude">🟣 Claude Code</option>
      <option value="codex" data-i18n="agCodex">🟢 Codex (OpenAI)</option>
      <option value="shell" data-i18n="agShell">🔷 PowerShell only</option>
      <option value="custom" data-i18n="agCustom">⚙ Custom command</option>
    </select>
    <input id="addTitle" data-i18n-ph="titlePh" style="flex:1;margin:0">
  </div>
</dialog>

<dialog id="winDlg" style="width:440px">
  <h3 data-i18n="winAskTitle" style="margin:0 0 8px">Where should this session open?</h3>
  <p id="winNote" style="font-size:12px;color:#fbbf24;margin:0 0 12px"></p>
  <div style="display:flex;flex-direction:column;gap:8px">
    <button class="wc-new primary" style="text-align:left;padding:12px 14px">
      <div style="font-weight:700" data-i18n="winNew">🖥 Open in a new window</div>
      <div style="font-size:11px;opacity:.9;font-weight:400" data-i18n="winNewHint">Recommended — if you have a second monitor, drag it over there.</div>
    </button>
    <button class="wc-cur" style="text-align:left;padding:12px 14px">
      <div style="font-weight:700" data-i18n="winCurrent">➕ Add to this window</div>
      <div style="font-size:11px;color:var(--muted);font-weight:400" data-i18n="winCurrentHint">Keeps everything here.</div>
    </button>
  </div>
</dialog>

 textChip:'टेक्स्ट', charsUnit:' अक्षर', fbUsage:'📊 आज {t} / 7दि {w}', modeT:'मोड बदलें', fontSel:'फ़ॉन्ट आकार', locale:'hi-IN' }
};
let LANG = localStorage.getItem('pt_lang') || 'en';
if (!I18N[LANG]) LANG = 'en';
let T = Object.assign({}, I18N.en, I18N[LANG]);   // 빠진 키는 영어로 폴백
function setLang(l) { localStorage.setItem('pt_lang', l); location.reload(); }
function applyStatic() {
  const sel = document.getElementById('langSel');
  sel.value = LANG;
  document.querySelectorAll('[data-i18n]').forEach(el => { if (T[el.dataset.i18n]) el.textContent = T[el.dataset.i18n]; });
  document.querySelectorAll('[data-i18n-title]').forEach(el => { if (T[el.dataset.i18nTitle]) el.title = T[el.dataset.i18nTitle]; });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => { if (T[el.dataset.i18nPh]) el.placeholder = T[el.dataset.i18nPh]; });
  // 모바일에선 언어 선택을 EN/KO 짧게 표시 (자리 절약)
  [...sel.options].forEach(o => { o.textContent = isMobileNow() ? o.dataset.short : ('🌐 ' + o.dataset.full); });
}
// 폰 세로 + 폰 가로(높이 낮음) 모두 모바일 취급 — 가로회전 시 PC 레이아웃으로 깨지지 않게
function isMobileNow() {
  return matchMedia('(max-width: 700px)').matches ||
         (matchMedia('(pointer: coarse)').matches && matchMedia('(max-height: 520px)').matches);
}

const grid = document.getElementById('grid');
const addDlg = document.getElementById('addDlg');
const panes = new Map();   // id -> {el, term, fit, ws, sess}
const isMobile = isMobileNow();
let maxedId = null;        // 확대(포커스) 중인 세션 id — null이면 일반 격자
const MIN_W = 300;         // 세션 한 칸 최소 폭 — 이보다 좁아지면 2줄/새 창 안내
const FOCUS_FR = 3;        // 확대 시 그 칸이 차지하는 비율 (나머지 칸은 1)

// ---------- 여러 창 분산 (창이 좁아지면 다른 브라우저 창으로) ----------
// 팝업 창은 URL ?wsess=<id,id> 로 자기 세션만 표시. main 창은 나머지를 표시.
const _q = new URLSearchParams(location.search);
const WSET = new Set((_q.get('wsess') || '').split(',').filter(Boolean));
const IS_MAIN = WSET.size === 0;
function getPopped() {                       // 다른 창이 가져간(=이 창에서 숨길) 세션 id 집합
  try { return new Set(JSON.parse(localStorage.getItem('pt_popped') || '[]')); } catch (e) { return new Set(); }
}
function setPopped(set) { localStorage.setItem('pt_popped', JSON.stringify([...set])); }
function addPopped(ids) { const s = getPopped(); ids.forEach(i => s.add(i)); setPopped(s); }
function removePopped(ids) { const s = getPopped(); ids.forEach(i => s.delete(i)); setPopped(s); }
// 이 창에 이 세션을 그릴지 여부
function belongsHere(id) {
  if (isMobile) return true;                 // 폰은 항상 전체 표시
  if (!IS_MAIN) return WSET.has(id);          // 팝업 창: 자기 것만
  return !getPopped().has(id);                // main 창: 남이 안 가져간 것만
}

async function api(method, url, body) {
  const r = await fetch(url + (url.includes('?') ? '&' : '?') + 'token=' + TOKEN, {
    method, headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined
  });
  return r.json();
}

// ---------- 세션 패널 ----------
function buildPane(sess, idx) {
  const el = document.createElement('div');
  el.className = 'pane';
  el.dataset.id = sess.id;
  const isClaude = !sess.agent || sess.agent === 'claude';
  const models = [['default', T.mDefault], ['opus', 'Opus'], ['sonnet', 'Sonnet'], ['haiku', 'Haiku'], ['fable', 'Fable'], ['opusplan', 'Opus Plan']];
  const modelSel = isClaude ? `<select class="modelSel" title="${T.modelTip}">
      ${models.map(m => `<option value="${m[0]}" ${((sess.model || 'default') === m[0]) ? 'selected' : ''}>${esc(m[1])}</option>`).join('')}
    </select>` : `<span style="font-size:10px;background:#166534;border-radius:4px;padding:2px 6px">${esc(sess.agent === 'custom' ? (sess.cmd || 'custom') : sess.agent)}</span>`;
  el.innerHTML = `
    <div class="pane-head" draggable="true">
      <div class="ph-top">
        <span class="numwrap"><span class="num">${idx + 1}</span><span class="donebadge">${esc(T.doneBadge)}</span></span>
        <span class="title" title="${T.renameHint}">${esc(sess.title)}</span>
        <span class="st"></span>
        <button class="small btnTasks" title="${T.tasksT}">☰</button>
        <button class="small btnMax" title="${T.maxT}">⛶</button>
        <button class="small btnPrev" title="${T.previewT}">👁</button>
        <button class="small btnMode" title="${T.modeT}" style="color:#a5b4fc;font-weight:700">⇄ auto</button>
        <select class="small fontSel" title="${T.fontSel}">
          ${[10, 11, 12, 13, 14, 15, 16, 18, 20, 22].map(s => `<option value="${s}" ${s === (isMobile ? 13 : 15) ? 'selected' : ''}>A${s}</option>`).join('')}
        </select>
        <button class="small btnClose" title="${T.closeT}" style="color:#f87171">✕</button>
      </div>
      <div class="ph-bottom">
        <span class="folder" title="${esc(sess.path)}">${esc(sess.path)}</span>
        ${modelSel}
      </div>
    </div>
    <div class="pane-body">
      <div class="term"></div>
      <iframe class="preview hidden"></iframe>
    </div>
    <div class="quick">
      <textarea placeholder="${T.quickPh}" enterkeyhint="send" rows="1"></textarea>
      <button class="small qImg" title="${T.imgT}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></button>
      <input type="file" class="qFile" accept="image/*" style="display:none">
      <button class="small qSend">${T.send}</button>
    </div>`;
  grid.appendChild(el);

  // 터미널
  const term = new Terminal({
    fontSize: isMobile ? 13 : 15, fontFamily: 'Consolas, D2Coding, monospace',
    theme: { background: '#283543' }, convertEol: false, scrollback: 5000
  });
  const fit = new FitAddon.FitAddon();
  term.loadAddon(fit);
  // 터미널 안의 URL 열기 — PC는 Ctrl/⌘+클릭 (실수 방지), 폰은 그냥 탭
  try {
    if (window.WebLinksAddon) term.loadAddon(new WebLinksAddon.WebLinksAddon(
      (event, uri) => { if (isMobile || event.ctrlKey || event.metaKey) window.open(uri, '_blank', 'noopener'); }));
  } catch (e) {}
  term.open(el.querySelector('.term'));
  fit.fit();

  // 모바일: 가운데 1/3 = 이 터미널 스크롤백(위 내용) · 양옆 1/3 = 페이지 스크롤
  if (isMobile) {
    const body = el.querySelector('.pane-body');
    const pl = document.createElement('div'); pl.className = 'pgzone l';
    const pr = document.createElement('div'); pr.className = 'pgzone r';
    const sz = document.createElement('div'); sz.className = 'scrollzone';
    body.appendChild(pl); body.appendChild(pr); body.appendChild(sz);
    // 가운데 존 세로 드래그: 스크롤백(위 내용) 있으면 이 터미널 스크롤, 없으면 페이지 스크롤 (항상 반응)
    let sy = 0;
    sz.addEventListener('touchstart', e => { sy = e.touches[0].clientY; sz.classList.add('touching'); }, { passive: true });
    sz.addEventListener('touchmove', e => {
      const dy = sy - e.touches[0].clientY;
      if (Math.abs(dy) < 4) return;
      const buf = term.buffer.active;
      const canUp = buf.viewportY > 0;                        // 위로 더 볼 내용
      const canDown = buf.viewportY < buf.baseY;              // 아래로 더 볼 내용
      if ((dy < 0 && canUp) || (dy > 0 && canDown)) term.scrollLines(dy > 0 ? 1 : -1);
      else window.scrollBy(0, dy);                            // 스크롤백 없으면 페이지 스크롤
      sy = e.touches[0].clientY;
    }, { passive: true });
    sz.addEventListener('touchend', () => setTimeout(() => sz.classList.remove('touching'), 250), { passive: true });
    sz.addEventListener('touchcancel', () => sz.classList.remove('touching'), { passive: true });
  }

  // WebSocket — 폰 절전/탭 전환으로 끊겨도 자동 재접속 (세션은 서버에 살아있음)
  let ws;
  let closedByUser = false;
  function connect() {
    ws = new WebSocket(`${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/term?id=${sess.id}&token=${TOKEN}`);
    let first = true;
    ws.onmessage = e => {
      const m = JSON.parse(e.data);
      if (m.type === 'out') {
        if (first) { term.reset(); first = false; }   // 재접속 시 버퍼 전체 재생 — 중복 방지
        term.write(m.data);
        // 하단 푸터에서 현재 모드를 읽어 ⇄ 버튼에 표시 (auto / accept / plan)
        if (m.data.includes(' mode') || m.data.includes('accept edits')) {
          const mode = m.data.includes('plan mode') ? 'plan'
                     : m.data.includes('accept edits') ? 'accept'
                     : m.data.includes('auto mode') ? 'auto' : null;
          if (mode) el.querySelector('.btnMode').textContent = '⇄ ' + mode;
        }
        // 실제 모델을 출력에서 읽어 드롭다운에 반영 (거짓말 방지) — 값만 바꿈(onchange 미발동)
        if (modelDrop) {
          const dm = detectModel(m.data);
          if (dm && modelDrop.value !== dm) { modelDrop.value = dm; sess.model = dm; }
        }
      }
      else if (m.type === 'status') setState(el, m.done, m.busy);
      else if (m.type === 'exit') term.write('\r\n\x1b[31m' + T.exitMsg + '\x1b[0m\r\n');
    };
    ws.onopen = () => { sendResize(); };
    ws.onclose = () => { if (!closedByUser) setTimeout(connect, 1500); };
  }
  connect();
  term.onData(d => { if (ws.readyState === 1) ws.send(JSON.stringify({ type: 'in', data: d })); });
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && ws.readyState !== 1 && !closedByUser) connect();
  });

  function sendResize() {
    fit.fit();
    if (ws.readyState === 1) ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
  }
  new ResizeObserver(() => sendResize()).observe(el.querySelector('.pane-body'));

  // 제목 더블클릭 수정
  const titleEl = el.querySelector('.title');
  titleEl.addEventListener('dblclick', () => {
    const input = document.createElement('input');
    input.className = 'title-edit';
    input.value = sess.title;
    titleEl.replaceWith(input);
    input.focus(); input.select();
    const commit = async () => {
      sess.title = input.value.trim() || sess.title;
      await api('PATCH', '/api/sessions/' + sess.id, { title: sess.title });
      input.replaceWith(titleEl);
      titleEl.textContent = sess.title;
      renderMinimap();
    };
    input.addEventListener('keydown', ev => { if (ev.key === 'Enter') commit(); if (ev.key === 'Escape') input.replaceWith(titleEl); });
    input.addEventListener('blur', commit);
  });

  // 초록 테두리: 클릭하면 해제
  el.addEventListener('click', () => {
    if (el.classList.contains('done')) {
      api('POST', '/api/sessions/' + sess.id + '/clear-done');
      el.classList.remove('done');
    }
  }, true);

  // 👁 미리보기 — 만든 웹페이지/앱을 새 브라우저 창으로 연다
  el.querySelector('.btnPrev').onclick = (ev) => {
    ev.stopPropagation();
    let url = prompt(T.previewPrompt, sess.previewUrl || 'http://localhost:3000');
    if (url === null) return;             // 취소
    url = url.trim();
    if (!url) url = location.origin + '/preview/' + sess.id + '/index.html?token=' + (TOKEN || '');
    sess.previewUrl = url;
    api('PATCH', '/api/sessions/' + sess.id, { previewUrl: url });
    window.open(url, '_blank');           // 새 창
  };

  // AI 모델 선택 (Claude 세션) — 확실히 바꾸려면 세션을 그 모델로 재시작 (대화는 --continue로 이어짐)
  const modelDrop = el.querySelector('.modelSel');
  if (modelDrop) modelDrop.onchange = async (ev) => {
    ev.stopPropagation();
    const prev = sess.model || 'default';
    const next = modelDrop.value;
    if (next === prev) return;
    if (!confirm(T.modelRestartAsk)) { modelDrop.value = prev; return; }
    sess.model = next;
    await api('PATCH', '/api/sessions/' + sess.id, { model: next });
    // 서버가 PTY를 새 모델로 재시작하고 소켓을 닫음 → ws.onclose가 자동 재접속
  };

  // ☰ 작업목록(tasks) 접기/펼치기 — 브라우저가 Ctrl+T를 가로채므로 버튼으로 \x14(=Ctrl+T) 전송
  el.querySelector('.btnTasks').onclick = ev => {
    ev.stopPropagation();
    if (ws.readyState === 1) ws.send(JSON.stringify({ type: 'in', data: '\x14' }));
    term.focus();
  };

  // ⛶ 확대 토글 — 이 창을 크게, 나머지는 얇게. 다시 누르면 원래대로
  el.querySelector('.btnMax').onclick = ev => {
    ev.stopPropagation();
    maxedId = (maxedId === sess.id) ? null : sess.id;
    applyLayout();
    if (maxedId === sess.id && isMobile) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    // 레이아웃이 바뀌면 모든 터미널 크기 다시 맞추기 (ResizeObserver 보조)
    setTimeout(() => panes.forEach(p => {
      try { p.fit.fit(); } catch (e) {}
      if (p.ws.readyState === 1) p.ws.send(JSON.stringify({ type: 'resize', cols: p.term.cols, rows: p.term.rows }));
    }), 80);
  };

  // 글자 크기 — 선택식 드롭다운
  const fontSel = el.querySelector('.fontSel');
  fontSel.onchange = ev => { ev.stopPropagation(); term.options.fontSize = +fontSel.value; sendResize(); };

  // ⇄ 모드 전환 — Claude Code에 Shift+Tab 전송 (auto mode ↔ accept edits ↔ plan ...)
  el.querySelector('.btnMode').onclick = ev => {
    ev.stopPropagation();
    if (ws.readyState === 1) ws.send(JSON.stringify({ type: 'in', data: '\x1b[Z' }));
    term.focus();
  };

  // 닫기
  el.querySelector('.btnClose').onclick = async (ev) => {
    ev.stopPropagation();
    if (!confirm(T.confirmClose.replace('{t}', sess.title))) return;
    await api('DELETE', '/api/sessions/' + sess.id);
    closedByUser = true;
    ws.close(); el.remove(); panes.delete(sess.id);
    renumber();
  };

  // 하단 빠른 입력줄 — 여러 줄 자동 확장, Ctrl+Z/Y 되돌리기, 이미지/긴 글은 짧은 칩 (전송 시 실제 내용으로 확장)
  const qInput = el.querySelector('.quick textarea');
  const attachMap = new Map();   // 칩 토큰 -> {type:'image'|'file'|'text', value}
  let attachN = 0;
  const autoGrow = () => {       // 쓸수록 위로 커지고, 전송하면 한 줄로 복귀
    qInput.style.height = 'auto';
    qInput.style.height = Math.min(qInput.scrollHeight, window.innerHeight * 0.34) + 'px';
  };
  qInput.addEventListener('input', autoGrow);
  function insertToken(token) {
    qInput.focus();
    const t = (qInput.value && !/\s$/.test(qInput.value) ? ' ' : '') + token + ' ';
    // execCommand로 넣어야 브라우저 기본 undo(Ctrl+Z) 히스토리가 유지됨
    let ok = false;
    try { qInput.setSelectionRange(qInput.value.length, qInput.value.length); ok = document.execCommand('insertText', false, t); } catch (e) {}
    if (!ok) qInput.value += t;
    autoGrow();
  }
  const send = () => {
    let val = qInput.value;
    if (!val.trim()) return;
    for (const [token, att] of attachMap) {   // 칩 → 실제 내용
      if (!val.includes(token)) continue;
      // 이미지·여러줄텍스트(파일) = 경로만 / 한 줄 긴 글 = 인라인 (개행 없으니 조기 제출 없음)
      const rep = (att.type === 'text') ? att.value : '"' + att.value + '"';
      val = val.split(token).join(rep);
    }
    // 직접 타이핑한 줄바꿈은 ESC+CR(제출 없는 개행)로 변환 — 여러 줄이 한 요청으로 감
    val = val.replace(/\r?\n/g, '\x1b\r');
    ws.send(JSON.stringify({ type: 'in', data: val }));
    setTimeout(() => ws.send(JSON.stringify({ type: 'in', data: '\r' })), 80);
    qInput.value = ''; attachMap.clear(); attachN = 0; autoGrow();
  };
  qInput.addEventListener('keydown', ev => {
    if (ev.key === 'Enter' && !ev.shiftKey) { ev.preventDefault(); send(); }   // Shift+Enter = 줄바꿈
  });
  el.querySelector('.qSend').onclick = send;

  // 🖼 이미지 붙여넣기/첨부 — 서버 폴더에 저장 후 [이미지 #N] 칩으로 표시 (전송 시 경로로 확장)
  async function attachImage(file) {
    if (!file) return;
    const b64 = await new Promise(r => { const fr = new FileReader(); fr.onload = () => r(fr.result); fr.readAsDataURL(file); });
    qInput.disabled = true; const ph = qInput.placeholder; qInput.placeholder = '⏳ ' + (T.imgUploading || 'uploading…');
    const r = await api('POST', '/api/sessions/' + sess.id + '/upload-image', { data: b64, name: file.name || 'paste.png' });
    qInput.disabled = false; qInput.placeholder = ph;
    if (r && r.path) {
      const token = '[' + T.imgChip + ' #' + (++attachN) + ']';
      attachMap.set(token, { type: 'image', value: r.path });
      insertToken(token);
    } else alert((T.imgFail || 'Image upload failed') + ': ' + ((r && r.error) || ''));
  }
  // 여러 줄 긴 글은 서버에 .txt로 저장 → 전송 시 경로만 (조기 제출 방지, Claude가 파일을 읽음)
  async function attachText(text) {
    qInput.disabled = true; const ph = qInput.placeholder; qInput.placeholder = '⏳ ' + (T.imgUploading || 'uploading…');
    const r = await api('POST', '/api/sessions/' + sess.id + '/upload-text', { text });
    qInput.disabled = false; qInput.placeholder = ph;
    if (r && r.path) {
      const token = '[' + T.textChip + ' #' + (++attachN) + ' · ' + text.length + T.charsUnit + ']';
      attachMap.set(token, { type: 'file', value: r.path });
      insertToken(token);
    } else {
      // 업로드 엔드포인트가 아직 없으면(서버 재시작 전) 원문 그대로 삽입
      const b = qInput.value; qInput.value = b + (b && !/\s$/.test(b) ? ' ' : '') + text;
    }
  }
  qInput.addEventListener('paste', ev => {
    const cd = ev.clipboardData;
    const items = [...((cd && cd.items) || [])];
    const img = items.find(it => it.type && it.type.startsWith('image/'));
    if (img) { ev.preventDefault(); attachImage(img.getAsFile()); return; }
    const text = (cd && cd.getData && cd.getData('text')) || '';
    if (!text) return;
    if (text.includes('\n')) {          // 여러 줄 → 파일로 저장(안정적 제출)
      ev.preventDefault();
      attachText(text);
    } else if (text.length > 100) {     // 한 줄 긴 글 → 칩(전송 시 인라인)
      ev.preventDefault();
      const token = '[' + T.textChip + ' #' + (++attachN) + ' · ' + text.length + T.charsUnit + ']';
      attachMap.set(token, { type: 'text', value: text });
      insertToken(token);
    }
  });
  const qFile = el.querySelector('.qFile');
  el.querySelector('.qImg').onclick = ev => { ev.stopPropagation(); qFile.click(); };
  qFile.onchange = () => { if (qFile.files[0]) attachImage(qFile.files[0]); qFile.value = ''; };

  // 드래그로 순서 바꾸기
  const head = el.querySelector('.pane-head');
  head.addEventListener('dragstart', ev => { el.classList.add('dragging'); ev.dataTransfer.setData('text/plain', sess.id); });
  head.addEventListener('dragend', () => el.classList.remove('dragging'));
  el.addEventListener('dragover', ev => { ev.preventDefault(); el.classList.add('dragover'); });
  el.addEventListener('dragleave', () => el.classList.remove('dragover'));
  el.addEventListener('drop', async ev => {
    ev.preventDefault(); el.classList.remove('dragover');
    const fromId = ev.dataTransfer.getData('text/plain');
    if (!fromId || fromId === sess.id) return;
    const fromEl = grid.querySelector(`[data-id="${fromId}"]`);
    if (fromEl) {
      const nodes = [...grid.children];
      grid.insertBefore(fromEl, nodes.indexOf(fromEl) < nodes.indexOf(el) ? el.nextSibling : el);
      renumber();
      await api('POST', '/api/reorder', { ids: [...grid.children].map(x => x.dataset.id) });
    }
  });

  // 이 창에서만 제거 (서버 세션은 유지) — 다른 창이 가져갈 때 사용. 재접속 방지 위해 closedByUser 설정
  const kill = () => { closedByUser = true; try { ws.close(); } catch (e) {} };
  panes.set(sess.id, { el, term, fit, ws, sess, kill });
}

// 터미널 출력에서 실제 모델 감지 ("Set model to Fable 5", "Kept model as Opus 4.8" 등)
function detectModel(text) {
  const m = text.match(/(?:Set model to|Kept model as|Model set to|Using model:?)\s+([A-Za-z]+(?:\s*Plan)?)/i);
  if (!m) return null;
  const w = m[1].toLowerCase();
  if (w.includes('plan')) return 'opusplan';
  if (w.startsWith('opus')) return 'opus';
  if (w.startsWith('sonnet')) return 'sonnet';
  if (w.startsWith('haiku')) return 'haiku';
  if (w.startsWith('fable')) return 'fable';
  return null;
}

// 폰 상단 미니맵: PC와 같은 배치로 제목만 표시, 탭하면 그 작업창으로 스크롤
function renderMinimap() {
  const mm = document.getElementById('minimap');
  mm.innerHTML = '';
  [...grid.children].forEach((paneEl, i) => {
    const id = paneEl.dataset.id;
    const p = panes.get(id);
    const cell = document.createElement('div');
    cell.className = 'mm-cell' + (paneEl.classList.contains('done') ? ' done' : '');
    cell.dataset.mm = id;
    cell.innerHTML = `<span class="mm-num">${i + 1}</span><span class="mm-title">${esc(p ? p.sess.title : '')}</span>`;
    cell.onclick = () => {
      // 클릭한 탭 강조 + 연결된 화면 잠깐 반짝 → 몇번 탭이 몇번 화면인지 직관적으로
      mm.querySelectorAll('.mm-cell').forEach(c => c.classList.remove('active'));
      cell.classList.add('active');
      // 고정 헤더+탭메뉴 높이만큼 빼서 스크롤 — 제목이 가려지지 않게
      const hdr = document.querySelector('header');
      const overlay = (hdr ? hdr.offsetHeight : 0) + mm.offsetHeight + 6;
      const y = paneEl.getBoundingClientRect().top + window.scrollY - overlay;
      window.scrollTo({ top: Math.max(0, y), behavior: 'smooth' });
      paneEl.style.transition = 'box-shadow .2s';
      paneEl.style.boxShadow = '0 0 0 3px var(--pink)';
      setTimeout(() => { paneEl.style.boxShadow = ''; }, 900);
    };
    mm.appendChild(cell);
  });
  applyLayout();
  saveOrder();   // 배열이 바뀔 때마다 현재 순서 기억 → 재시작 시 그대로 복원
  if (typeof syncStickyOffset === 'function') syncStickyOffset();
}

// PC 배치 규칙: 1개=전체 · 2개=좌우 · 3개=좌상/우상/하단(전체폭) · 4개=2×2 · 5개↑=3열
function applyLayout() {
  const els = [...grid.children];
  const n = els.length;
  if (typeof scheduleRefit === 'function') scheduleRefit();   // 배치 바뀌면 곧 모든 터미널 재fit
  // 확대 대상이 이미 닫혔으면 초기화
  if (maxedId && !els.some(el => el.dataset.id === maxedId)) maxedId = null;
  const hasMax = maxedId && n > 1;

  els.forEach(el => {
    el.style.gridColumn = '';
    el.style.gridRow = '';
    const isMax = el.dataset.id === maxedId;
    el.classList.toggle('maxed', hasMax && isMax);
    el.classList.toggle('mini', hasMax && !isMax);
  });
  grid.classList.toggle('maxmode', !!hasMax);

  if (isMobile) { grid.style.gridTemplateColumns = ''; grid.style.gridTemplateRows = ''; grid.style.height = ''; return; }

  grid.style.gridTemplateRows = '';
  grid.style.height = '';
  // 1=전체 · 2=좌우 반반 · 3개↑=가로로 나란히 (한 줄).
  // 한 칸이 MIN_W(300px) 미만으로 좁아지면 2줄로 접어서 배치.
  const gw = grid.clientWidth || window.innerWidth;
  let cols, singleRow;
  if (n <= 1) { cols = 1; singleRow = true; }
  else if (n === 2) { cols = 2; singleRow = true; }
  else { singleRow = (gw / n >= MIN_W); cols = singleRow ? n : Math.ceil(n / 2); }

  // 열 너비 — 확대 중이면 그 칸의 열만 크게. 위치는 그대로, grid 트랜지션으로 부드럽게 커짐
  const weights = Array(cols).fill('1fr');
  if (hasMax) {
    const fi = els.findIndex(el => el.dataset.id === maxedId);
    if (fi >= 0) weights[fi % cols] = FOCUS_FR + 'fr';
  }
  grid.style.gridTemplateColumns = weights.join(' ');

  if (singleRow) {   // 한 줄이면 남은 세로 공간을 꽉 채움
    const off = (document.querySelector('header').offsetHeight || 56) + 24;
    grid.style.gridTemplateRows = '1fr';
    grid.style.height = `calc(100vh - ${off}px)`;
  }
}

// ---------- 📱 QR + 접속 주소 (켜고 끄기 · 복사 · 저장) ----------
const qrDlg = document.getElementById('qrDlg');
let qrUrl = '';
function drawQR(canvas, text) {
  const q = qrcode(0, 'M');
  q.addData(text); q.make();
  const n = q.getModuleCount();
  const ctx = canvas.getContext('2d');
  const size = canvas.width, cell = size / (n + 4);   // 여백 2칸
  ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, size, size);
  ctx.fillStyle = '#000';
  for (let r = 0; r < n; r++) for (let c = 0; c < n; c++)
    if (q.isDark(r, c)) ctx.fillRect((c + 2) * cell, (r + 2) * cell, cell + 0.5, cell + 0.5);
}
function urlRow(label, url) {
  const d = document.createElement('div');
  d.style.cssText = 'margin:6px 0';
  d.innerHTML = `<div style="font-size:11px;color:var(--muted);margin-bottom:2px">${label}</div>
    <div style="display:flex;gap:6px">
      <input readonly value="${url.replace(/"/g, '&quot;')}" style="flex:1;font-size:12px" onclick="this.select()">
      <button class="small">📋</button>
    </div>`;
  d.querySelector('button').onclick = () => {
    const inp = d.querySelector('input');
    inp.select(); inp.setSelectionRange(0, 99999);
    let ok = false;
    try { ok = document.execCommand('copy'); } catch (e) {}
    if (!ok && navigator.clipboard) { navigator.clipboard.writeText(url).then(() => {}); ok = true; }
    d.querySelector('button').textContent = ok ? '✅' : '📋';
    setTimeout(() => d.querySelector('button').textContent = '📋', 1500);
  };
  return d;
}
let qrRevealed = false;
async function toggleQR() {
  if (qrDlg.open) { qrDlg.close(); return; }
  // 매번 경고 관문부터 — 동의해야 QR 표시 (유출 주의·본인 책임)
  qrRevealed = false;
  document.getElementById('qrGate').style.display = 'block';
  document.getElementById('qrBody').style.display = 'none';

}
// 외부접속·같은 와이파이를 좌우로 나란히 표시
function qrColumn(title, accent, url, noteText) {
  const col = document.createElement('div');
  col.style.cssText = 'flex:1;min-width:0;text-align:center';
  col.innerHTML = `<div style="font-weight:700;color:${accent};margin-bottom:6px">${title}</div>`;
  if (url) {
    const box = document.createElement('div');
    box.style.cssText = 'background:#fff;border-radius:12px;padding:10px;display:inline-block';
    const cv = document.createElement('canvas');
    cv.width = 200; cv.height = 200;
    box.appendChild(cv);
    col.appendChild(box);
    drawQR(cv, url);
    col.appendChild(urlRow('', url));
  } else {
    const n = document.createElement('div');
    n.style.cssText = 'font-size:12px;color:#fbbf24;padding:30px 8px;border:1px dashed var(--line);border-radius:12px';
    n.textContent = noteText;
    col.appendChild(n);
  }
  return col;
}
async function renderQR() {
  const i = await api('GET', '/api/info');

async function browseTo(dir) {

  brDir = r.dir;
  document.getElementById('brCur').textContent = r.dir || '💻 ' + (T.drives || 'Drives');
  document.getElementById('addPath').value = r.dir || '';
  const list = document.getElementById('brList');
  list.innerHTML = '';
  r.folders.forEach(f => {
    const full = r.dir ? (r.dir.endsWith('\\') ? r.dir + f : r.dir + '\\' + f) : f;
    const cell = document.createElement('div');
    cell.className = 'brfolder';

}

// ---------- 세션 추가 ----------
async function openAdd() {
  let known = [];
  try { known = await api('GET', '/api/known-projects'); } catch (e) {}
  const list = document.getElementById('knownList');
  list.className = '';
  list.innerHTML = '';
  const norm = p => (p || '').replace(/[\\/]+$/, '').toLowerCase();

  const mini = (num, title, path, off) => {
    const c = document.createElement('div');
    c.className = 'mini-pane' + (off ? ' off' : ' on');
    c.title = path;
    c.innerHTML = `<div class="mp-head"><span class="mp-num">${num}</span>` +
                  `<span class="mp-title">${esc(title)}</span>` +
                  (off ? '' : '<span class="mp-on">●</span>') + `</div>` +
                  `<div class="mp-body">${esc(path)}</div>`;
    return c;
  };

  // ① 현재 열린 세션 (밝게). PC=지금 화면처럼 가로 배열 · 모바일=얇게 세로 나열. 클릭=그 창으로 이동
  const openEls = [...grid.children];
  const openPaths = new Set();
  if (openEls.length) {
    const row = document.createElement('div');
    row.style.cssText = isMobile
      ? 'display:flex;flex-direction:column;gap:6px;margin-bottom:10px'
      : `display:grid;grid-template-columns:repeat(${openEls.length},1fr);gap:8px;margin-bottom:10px`;
    openEls.forEach((paneEl, i) => {
      const p = panes.get(paneEl.dataset.id);
      if (!p) return;
      openPaths.add(norm(p.sess.path));
      const c = mini(i + 1, p.sess.title, p.sess.path, false);
      if (isMobile) c.classList.add('mp-slim');   // 모바일: 얇은 한 줄
      c.onclick = () => {   // 카드 본문 클릭 = 그 창으로 이동
        addDlg.close();
        paneEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        paneEl.style.transition = 'box-shadow .2s';
        paneEl.style.boxShadow = '0 0 0 3px var(--pink)';
        setTimeout(() => { paneEl.style.boxShadow = ''; }, 900);
      };
      c.appendChild(cardIcons(p.sess.path,
        async () => {   // 빼기 = 이 세션 닫기
          if (!confirm(T.confirmClose.replace('{t}', p.sess.title))) return;
          addDlg.close();
          await api('DELETE', '/api/sessions/' + p.sess.id);
          removePaneLocal(p.sess.id); renumber();
        },
        async () => { addDlg.close(); await addSession(p.sess.path, p.sess.title, p.sess.agent, '', true); }));   // 중복 열기(이 창)
      row.appendChild(c);
    });
    list.appendChild(row);
  }

  // ② 닫힌(안 쓰는) 세션 — 회색. 클릭 = 다시 켜기
  const offItems = known.filter(k => k.path && !openPaths.has(norm(k.path)));
  if (offItems.length) {
    const offGrid = document.createElement('div');
    offGrid.className = 'known-grid';
    offItems.forEach((k, i) => {
      const nm = k.title || k.name || '';
      const c = mini(openEls.length + i + 1, nm, k.path, true);
      c.onclick = async () => { addDlg.close(); await addSession(k.path, nm, k.agent, '', true); };   // 클릭 = 다시 켜기(이 창)
      c.appendChild(cardIcons(k.path,
        async () => {   // 빼기 = 최근 목록에서 제거
          await api('POST', '/api/recent/remove', { path: k.path });
          c.remove();
        },
        async () => { addDlg.close(); await addSession(k.path, nm, k.agent, '', true); }));   // 중복 = 이 창에 하나 더
      offGrid.appendChild(c);
    });
    list.appendChild(offGrid);
  }

  document.getElementById('browser').style.display = 'none';
  switchTab('folder');
  addDlg.showModal();
}

// ---------- GitHub 저장소 clone ----------
async function loadRepos() {
  const box = document.getElementById('repoList');
  box.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:8px">…</div>';
  const repos = await api('GET', '/api/my-repos');
  box.innerHTML = '';
  if (repos.error) { box.innerHTML = `<div style="color:#fbbf24;font-size:12px;padding:8px">${esc(repos.error)}</div>`; return; }
  repos.forEach(r => {
    const b = document.createElement('button');
    b.className = 'proj';
    b.innerHTML = (r.isPrivate ? '🔒 ' : '📖 ') + esc(r.name);
    b.onclick = () => { document.getElementById('cloneUrl').value = r.url; };
    b.ondblclick = () => doClone(r.url);
    box.appendChild(b);
  });
}
function cloneRepo() { doClone(document.getElementById('cloneUrl').value.trim()); }
async function doClone(url) {
  if (!url) return;
  const btn = document.querySelector('#tab-github .primary');
  const old = btn.textContent; btn.disabled = true; btn.textContent = '⬇ …';
  const r = await api('POST', '/api/clone', { url });
  btn.disabled = false; btn.textContent = old;
  if (r.error) { alert(r.error); return; }
  addDlg.close();
  await placeNewSession(r);
}
async function addManual() {
  const p = document.getElementById('addPath').value.trim();
  if (!p) return;
  const agent = document.getElementById('addAgent').value;
  let cmd = '';
  if (agent === 'custom') {
    cmd = prompt(T.customPrompt, '');
    if (!cmd) return;
  }
  addDlg.close();
  await addSession(p, document.getElementById('addTitle').value.trim(), agent, cmd);
}
async function addSession(path, title, agent, cmd, skipPrompt) {
  const pick = document.getElementById('addAgent').value;
  const s = await api('POST', '/api/sessions', { path, title, agent: agent || pick, cmd });
  if (s.error) { alert(s.error); return; }
  if (skipPrompt) addHere(s);          // 이전에 쓰던 세션 다시 열기 = 새 창 묻지 않고 이 창에
  else await placeNewSession(s);       // 완전히 새 폴더 추가 = 5개↑면 새 창 물어봄
}

// 새 세션을 어디에 열지 결정: 이 창 / 새 창 (5개↑ 또는 폭이 너무 좁아지면 물어봄)
async function placeNewSession(s) {
  const next = grid.children.length + 1;
  const gw = grid.clientWidth || window.innerWidth;
  const tooNarrow = next >= 3 && (gw / next < MIN_W);   // 한 줄로 놓으면 한 칸이 300px 미만
  let target = 'current';
  if (!isMobile && (next >= 5 || tooNarrow)) {
    target = await askWindowChoice(tooNarrow);          // 좁으면 "이 창=2줄" 안내 포함
  }
  if (target === 'new') openInNewWindow(s);
  else addHere(s);
}
function addHere(s) {
  if (!IS_MAIN) { WSET.add(s.id); addPopped([s.id]); syncWsessUrl(); }
  else { removePopped([s.id]); }
  buildPane(s, grid.children.length);
  applyLayout();
  renderMinimap();
}
function openInNewWindow(s) {
  addPopped([s.id]);                                     // main 창에서 숨김
  const url = '/?wsess=' + encodeURIComponent(s.id) + '&token=' + encodeURIComponent(TOKEN || '');
  const w = window.open(url, 'ptwin_' + s.id, 'width=1200,height=820');
  if (!w) { removePopped([s.id]); addHere(s); return; } // 팝업 차단 시 이 창에 추가
}
function syncWsessUrl() {
  const u = new URL(location.href);
  u.searchParams.set('wsess', [...WSET].join(','));
  history.replaceState(null, '', u);
}
// 선택 다이얼로그 — twoRow=true면 "이 창에 넣으면 2줄로 배치" 안내
function askWindowChoice(twoRow) {
  return new Promise(resolve => {
    const dlg = document.getElementById('winDlg');
    document.getElementById('winNote').textContent = twoRow ? T.winAskRows : '';
    let done = false;
    const fin = v => { if (done) return; done = true; try { dlg.close(); } catch (e) {} resolve(v); };
    dlg.querySelector('.wc-cur').onclick = () => fin('current');
    dlg.querySelector('.wc-new').onclick = () => fin('new');
    dlg.addEventListener('close', () => fin('current'), { once: true });   // ESC = 이 창
    dlg.showModal();
  });
}

// ---------- 시작 ----------
// 상단 AI 사용량 — Claude 공식 한도 % 막대 (설정>사용량과 동일), 1분마다 갱신
function fmtLeft(ms) {   // 리셋까지 남은 시간: '1h 23m' / '45m'
  if (!ms || ms <= 0) return '';
  const m = Math.ceil(ms / 60000), h = Math.floor(m / 60);
  return h ? h + 'h ' + (m % 60) + 'm' : m + 'm';
}
async function refreshUsage() {
  try {
    const u = await api('GET', '/api/usage');
    const el = document.getElementById('usage');
    let costHtml = '';
    if (u.fallback) {   // $비용 — PC에선 그래프와 함께 항상 병기
      costHtml = `<span class="ub ub-cost"><span class="ub-label">${T.fbUsage.replace('{t}', '$' + u.fallback.todayCost.toFixed(0)).replace('{w}', '$' + u.fallback.weekCost.toFixed(0))}</span></span>`;
    }
    if (u.bars && u.bars.length) {
      el.innerHTML = u.bars.map(b => {
        const label = b.kind === 'session' ? T.curSession
                    : b.kind === 'weekly_all' ? T.weeklyAll
                    : b.scopeName ? T.weeklyPfx + b.scopeName : (b.label || b.kind);
        const col = b.percent >= 90 ? '#ef4444' : b.percent >= 70 ? '#f59e0b' : '#3b82f6';
        const reset = b.resetsAt ? new Date(b.resetsAt).toLocaleString(T.locale, { weekday: 'short', hour: 'numeric', minute: '2-digit' }) : '';
        const left = b.resetsAt ? fmtLeft(new Date(b.resetsAt) - Date.now()) : '';
        const full = b.percent >= 100;   // 다 썼으면 남은시간을 빨갛게 강조
        return `<span class="ub ub-${b.kind}" title="${label} — ${T.resets}: ${reset}">
          <span class="ub-label">${label}</span>
          <span class="ub-track"><span class="ub-fill" style="width:${Math.min(100, b.percent)}%;background:${col}"></span></span>
          <span class="ub-pct">${b.percent}%</span>
          ${left ? `<span class="ub-left"${full ? ' style="color:#f87171;font-weight:700"' : ''}>⏳${left}</span>` : ''}</span>`;
      }).join('') + costHtml;
    } else if (costHtml) {
      el.innerHTML = costHtml;
    } else { el.textContent = ''; }
  } catch (e) {}
}
refreshUsage();

// 배너 (개발자가 GitHub banner.json 수정 → 모두에게 반영) + 새 버전 알림
async function refreshBanner() {
  try {
    const b = await api('GET', '/api/banner');
    const el = document.getElementById('banner');
    const list = (b.banners || []).filter(x => x && x.text);
    if (list.length) {
      let i = 0;
      const show = () => {
        const x = list[i % list.length];
        const txt = (x.text[LANG] || x.text.en || Object.values(x.text)[0]);
        el.innerHTML = (x.image ? `<img src="${x.image.replace(/"/g,'')}" style="height:18px;border-radius:4px;vertical-align:-4px;margin-right:6px">` : '') +
                       `<span class="bn-in">${esc(txt)}</span>`;
        el.href = x.url || '#';
        if (x.color) el.style.background = x.color;
        // 효과 적용 — banner.json의 effect 값으로 원격 제어
        el.className = '';
        if (x.effect && x.effect !== 'none') el.classList.add('fx-' + x.effect.replace(/[^a-z]/g, ''));
        el.style.display = 'inline-block';
        i++;
      };
      show();
      if (list.length > 1) setInterval(show, 8000);
    }
    if (b.feedbackUrl) feedbackUrl = b.feedbackUrl;
    // 실행 중인 서버가 최신보다 구버전이면 경고 — 자동 업데이트가 안 되는 상황(ZIP 복사본·복사본 여러 개) 안내
    if (b.latestVersion && b.currentVersion &&
        b.latestVersion.localeCompare(b.currentVersion, undefined, { numeric: true }) > 0) {
      showVersionWarning(b.currentVersion, b.latestVersion);

  } catch (e) {}
}

// ---------- 시작 세션 선택창 ----------
const pickDlg = document.getElementById('pickDlg');
let pickList = [];
function renderPicker() {
  const g = document.getElementById('pickGrid');
  g.innerHTML = '';
  pickList.forEach(s => {
    const c = document.createElement('div');
    c.className = 'pick-card' + (s._sel ? ' sel' : '') + (s._new ? ' pk-recent' : '');
    c.innerHTML = `<div class="pk-title">${esc(s.title)}${s._new ? ' <span style="font-size:9px;color:var(--muted);font-weight:400">· closed</span>' : ''}</div>
      <div class="pk-path">${esc(s.path)}</div>`;
    c.onclick = () => { s._sel = !s._sel; renderPicker(); };
    c.appendChild(cardIcons(s.path,
      async () => {   // 빼기: 목록에서 제거
        if (!confirm(T.confirmRemove.replace('{t}', s.title))) return;
        if (!s._new) await api('DELETE', '/api/sessions/' + s.id);
        pickList = pickList.filter(x => x.id !== s.id);
        renderPicker();
        if (!pickList.length) pickDlg.close();
      },
      async () => {   // 중복: 같은 폴더로 세션 하나 더 열기 (이 창에)
        pickDlg.close();
        await addSession(s.path, s.title, s.agent, '', true);
      }));
    g.appendChild(c);
  });
  const all = pickList.length && pickList.every(s => s._sel);
  document.getElementById('pickAll').checked = all;
}
function pickToggleAll(on) { pickList.forEach(s => s._sel = on); renderPicker(); }
async function pickStart() {
  pickDlg.close();
  // 종료 전 화면 배열 순서대로 세움 (기억된 순서에 없던 건 뒤로)
  const ordered = [...pickList].sort((a, b) => orderRank(a.path) - orderRank(b.path));
  for (const s of ordered) {
    const isPane = panes.has(s.id);
    if (s._sel && !isPane) {
      if (s._new) {   // 최근 닫은 세션 → 서버에 새로 만들어 켜기
        const ns = await api('POST', '/api/sessions', { path: s.path, title: s.title, agent: s.agent || 'claude' });
        if (!ns.error) buildPane(ns, grid.children.length);
      } else {
        buildPane(s, grid.children.length);   // 저장돼 있던 세션 그대로 재개
      }
    } else if (!s._sel && isPane) {
      removePaneLocal(s.id);   // 체크 해제 → 화면에서만 숨김 (서버 세션은 유지, 다시 선택 가능)
    }
  }
  renumber();
}

// 언제든 세션 선택창 열기 (서버가 안 꺼져 세션이 살아있어도 다시 고를 수 있게)
async function openPicker() {
  let list = [];
  try { list = await api('GET', '/api/sessions'); } catch (e) {}
  const nrm = p => (p || '').replace(/[\\/]+$/, '').toLowerCase();
  pickList = list.map(s => ({ ...s, _sel: panes.has(s.id) || s.alive }));   // 열려있거나 살아있으면 기본 체크
  try {
    const known = await api('GET', '/api/known-projects');
    const have = new Set(list.map(s => nrm(s.path)));
    known.filter(k => k.path && !k.active && !have.has(nrm(k.path))).forEach(k => {
      pickList.push({ id: 'new:' + nrm(k.path), title: k.title || k.name, path: k.path, agent: k.agent, _sel: false, _new: true });
    });
  } catch (e) {}
  pickList.sort((a, b) => orderRank(a.path) - orderRank(b.path));
  renderPicker();
  pickDlg.showModal();
}

  bc.postMessage({ type: 'pong', ids: [...WSET] });
}

// 이 창 소속으로 아직 안 그려진 세션은 그리고, 소속 아닌 세션은 제거 (서버 세션은 유지)
async function reconcile() {
  if (isMobile) return;
  let list;
  try { list = await api('GET', '/api/sessions'); } catch (e) { return; }
  let changed = false;
  [...panes.keys()].forEach(id => {
    if (!belongsHere(id) || !list.find(s => s.id === id)) { removePaneLocal(id); changed = true; }
  });
  list.forEach(s => { if (belongsHere(s.id) && !panes.has(s.id)) { buildPane(s, grid.children.length); changed = true; } });
  if (changed) { applyLayout(); renumber(); }   // renumber()가 번호 재정렬 + 미니맵까지 갱신 (변화 없으면 재렌더 안 함)
}
window.addEventListener('storage', e => { if (e.key === 'pt_popped') reconcile(); });
window.addEventListener('focus', reconcile);
setInterval(reconcile, 5000);
if (!IS_MAIN) window.addEventListener('beforeunload', () => { if (WSET.size) removePopped([...WSET]); });

applyStatic();
(async () => {
  try { const inf = await api('GET', '/api/info'); document.getElementById('hverBadge').textContent = 'v' + inf.version; } catch (e) {}
  const list = await api('GET', '/api/sessions');

  if (!IS_MAIN) {
    // 팝업 창: 내 세션(WSET)만 표시하고 main에서 숨기도록 표시
    addPopped([...WSET]);
    list.filter(s => WSET.has(s.id)).forEach((s, i) => buildPane(s, i));
    applyLayout();
    renderMinimap();
    return;
  }

  // main 창: 죽은 팝업이 남긴 세션은 되찾기 (핸드셰이크로 살아있는 창 확인)
  let popped = isMobile ? new Set() : getPopped();
  if (!isMobile && popped.size) {
    if (bc) {
      const covered = new Set();
      bc.onmessage = e => { if (e.data && e.data.type === 'pong') (e.data.ids || []).forEach(i => covered.add(i)); };
      bc.postMessage({ type: 'ping' });
      await new Promise(r => setTimeout(r, 800));         // 살아있는 창들의 응답 수집
      const orphans = [...popped].filter(i => !covered.has(i));
      if (orphans.length) removePopped(orphans);
      popped = getPopped();
    } else {
      removePopped([...popped]); popped = new Set();      // BroadcastChannel 없으면 안전하게 전부 되찾기
    }
  }

  const mine  = list.filter(s => !popped.has(s.id));
  const alive = mine.filter(s => s.alive)    // 서버가 계속 켜져 있던 경우(새로고침) — 그대로 복원
                    .sort((a, b) => orderRank(a.path) - orderRank(b.path));   // 기억된 화면 배열 순서로
  const idle  = mine.filter(s => !s.alive);  // 껐다 켠 경우 — 선택창으로

  alive.forEach((s, i) => buildPane(s, i));
  applyLayout();
  renderMinimap();

  // 선택창: 저장된 세션(idle, 기본 선택) + 최근 닫은 세션(recent, 미선택) 을 모두 보여줘 전체 구성 복원 가능
  pickList = idle.map(s => ({ ...s, _sel: true }));
  try {
    const known = await api('GET', '/api/known-projects');
    const nrm = p => (p || '').replace(/[\\/]+$/, '').toLowerCase();
    const have = new Set([...alive, ...idle].map(s => nrm(s.path)));
    known.filter(k => k.path && !k.active && !have.has(nrm(k.path))).forEach(k => {
      pickList.push({ id: 'new:' + nrm(k.path), title: k.title || k.name, path: k.path, agent: k.agent, _sel: false, _new: true });
      have.add(nrm(k.path));
    });
  } catch (e) {}
  pickList.sort((a, b) => orderRank(a.path) - orderRank(b.path));   // 선택창도 기억된 배열 순서로
  // 선택창은 '껐다 켜서 복원할 세션(idle)이 있을 때'만 자동으로 뜬다.
  // 서버가 계속 살아있어(alive) 이미 자동 복원됐고 남은 게 최근닫은(회색)뿐이면 팝업 안 띄움
  // — 그건 헤더의 ✔세션선택 버튼으로 언제든 열 수 있음.
  if (idle.length) {
    renderPicker();
    pickDlg.showModal();
  }
})();
</script>
