<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PowerTerminal 배너 관리자</title>
<style>
  :root { --bg:#111827; --panel:#1f2937; --line:#374151; --violet:#7C3AED; --pink:#EC4899; --fg:#e5e7eb; --muted:#9ca3af; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font-family:Pretendard,'Malgun Gothic',sans-serif; }
  main { max-width:860px; margin:0 auto; padding:20px 14px 80px; }
  h1 { font-size:20px; background:linear-gradient(90deg,var(--violet),var(--pink)); -webkit-background-clip:text; color:transparent; }
  h2 { font-size:15px; margin:26px 0 8px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px; margin:10px 0; }
  label { display:block; font-size:12px; color:var(--muted); margin:8px 0 3px; }
  input { width:100%; background:#111827; border:1px solid var(--line); color:var(--fg); border-radius:8px; padding:9px 10px; font-family:inherit; }
  .row { display:flex; gap:10px; } .row > div { flex:1; }
  button { border:0; border-radius:8px; background:#374151; color:var(--fg); padding:9px 14px; cursor:pointer; font-family:inherit; }
  button.primary { background:linear-gradient(90deg,var(--violet),var(--pink)); font-weight:700; }
  button.danger { color:#f87171; }
  /* 미리보기 — 실제 헤더와 동일 스타일 */
  .pv-head { display:flex; align-items:center; gap:10px; padding:10px 14px; border:1px solid var(--line); border-radius:10px; background:var(--bg); overflow:hidden; }
  .pv-head .logo { font-size:16px; font-weight:700; background:linear-gradient(90deg,var(--violet),var(--pink)); -webkit-background-clip:text; color:transparent; white-space:nowrap; }
  .pv-banner { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:700; color:#fff; text-decoration:none; padding:5px 12px; border-radius:99px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; background:linear-gradient(90deg,var(--violet),var(--pink)); max-width:60%; }
  .pv-banner img { height:18px; border-radius:4px; }
  .phone { width:360px; max-width:100%; }
  #status { font-size:13px; margin-top:10px; white-space:pre-wrap; }
  select { width:100%; background:#111827; border:1px solid var(--line); color:var(--fg); border-radius:8px; padding:9px 10px; font-family:inherit; }
  /* 배너 효과 미리보기 (사용자 화면과 동일 애니메이션) */
  @keyframes fxBlink { 0%,100%{opacity:1} 50%{opacity:.25} }
  @keyframes fxPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }
  @keyframes fxGlow { 0%,100%{box-shadow:0 0 4px 1px rgba(236,72,153,.5)} 50%{box-shadow:0 0 16px 5px rgba(236,72,153,.95)} }
  @keyframes fxShake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-2px)} 40%{transform:translateX(2px)} 60%{transform:translateX(-2px)} 80%{transform:translateX(2px)} }
  @keyframes fxSlide { 0%{transform:translateX(110%)} 100%{transform:translateX(-110%)} }
  @keyframes fxRainbow { 0%{filter:hue-rotate(0)} 100%{filter:hue-rotate(360deg)} }
  .pv-banner.fx-blink { animation: fxBlink 1.6s ease-in-out infinite; }
  .pv-banner.fx-pulse { animation: fxPulse 1.4s ease-in-out infinite; }
  .pv-banner.fx-glow { animation: fxGlow 1.6s ease-in-out infinite; }
  .pv-banner.fx-shake { animation: fxShake 1s ease-in-out infinite; }
  .pv-banner.fx-rainbow { animation: fxRainbow 4s linear infinite; }
  .pv-banner.fx-slide .bn-in { display:inline-block; animation: fxSlide 9s linear infinite; }
</style>
</head>
<body>
<main>
  <div style="display:flex;align-items:center;gap:10px">
    <h1 style="flex:1">📢 PowerTerminal 배너 관리자 <span id="verBadge" style="font-size:13px;color:var(--muted);background:#374151;padding:2px 10px;border-radius:99px;vertical-align:middle"></span></h1>
    <button onclick="goHome()" style="padding:8px 14px;font-weight:700" title="메인 화면으로">✕ 닫기</button>
  </div>
  <p style="font-size:13px;color:var(--muted)">여기서 저장+발행하면 GitHub의 banner.json이 갱신되고, <b>모든 사용자에게 10분 안에 반영</b>됩니다.</p>

  <div class="card" id="pwCard" style="display:none">
    <label>🔑 관리자 비밀번호 — 다른 기기(폰 등)에서 ⚙ 누를 때 이 비밀번호로 들어옵니다 (이 PC에서만 확인 가능)</label>
    <div class="row" style="align-items:center">
      <input id="pwField" readonly style="font-family:monospace;letter-spacing:1px">
      <button style="flex:0 0 auto" onclick="copyPw()">📋 복사</button>
      <button style="flex:0 0 auto" onclick="regenPw()">🔄 재발급</button>
    </div>
  </div>

  <div id="banners"></div>
  <button onclick="addBanner()">＋ 배너 추가</button>

  <h2>버전 알림 · 요청 링크</h2>
  <div class="card row">
    <div><label>최신 버전 (사용자에게 🔄 알림 기준)</label><input id="latestVersion"></div>
    <div><label>업데이트 안내 링크</label><input id="updateUrl"></div>
  </div>
  <div class="card">
    <label>✉ 요청 버튼 링크 (GitHub Issues·구글폼 등 — 사용자가 요청글 남기는 곳)</label>
    <input id="feedbackUrl" placeholder="https://github.com/1215kkm/PowerTerminal/issues/new">
  </div>

  <h2>📊 사용자 · 다운로드 통계 <button onclick="loadStats()" style="font-size:12px;padding:5px 10px;margin-left:6px">↻ 새로고침</button></h2>
  <div class="card" id="statsCard">
    <div id="statsBody" style="font-size:13px;color:var(--muted)">불러오는 중…</div>
  </div>

  <h2>미리보기 — 사용자 화면 상단에 이렇게 보입니다</h2>
  <label>PC</label>
  <div class="pv-head"><span class="logo">🚀 PowerTerminal</span><a class="pv-banner" id="pvPC" target="_blank"></a><span style="flex:1"></span><span style="font-size:12px;color:var(--muted)">📱 QR · 🔗 · 🌐 · ＋</span></div>
  <label>폰 (좁은 화면)</label>
  <div class="phone"><div class="pv-head"><span class="logo">🚀</span><a class="pv-banner" id="pvMO" target="_blank" style="max-width:75%"></a></div></div>
  <p style="font-size:12px;color:var(--muted)">배너가 여러 개면 8초마다 순환 표시됩니다. 영상은 배너 클릭 시 열리는 링크(유튜브 등)로 연결하세요.</p>

  <div style="display:flex;gap:10px;margin-top:18px">
    <button class="primary" onclick="publish()">🚀 저장 + GitHub 발행 (전 사용자 반영)</button>
    <button onclick="load()">↺ 되돌리기</button>
  </div>
  <div id="status"></div>
</main>

<script>
const TOKEN = new URLSearchParams(location.search).get('token') || (document.cookie.split('cc_token=')[1] || '').split(';')[0];
let data = { banners: [], latestVersion: '', updateUrl: '' };
function goHome() {
  // 메인에서 새 탭으로 열렸으면 이 탭만 닫음 (메인 화면의 입력 중이던 요청글 보존)
  if (window.opener || history.length <= 1) { window.close(); return; }
  location.href = '/' + (TOKEN ? '?token=' + TOKEN : '');
}

async function api(method, url, body) {
  const r = await fetch(url + (url.includes('?') ? '&' : '?') + 'token=' + TOKEN, {
    method, headers: { 'Content-Type': 'application/json' }, body: body ? JSON.stringify(body) : undefined });
  return r.json();
}

function bannerCard(b, i) {
  const t = b.text || {};
  const d = document.createElement('div');
  d.className = 'card';
  d.innerHTML = `
    <label>문구 (한국어) — 여기에 쓰고 '자동 번역'을 누르면 나머지 언어가 채워집니다</label>
    <div class="row">
      <input data-k="ko" value="${esc(t.ko || '')}" placeholder="예: 🚀 폰에서도 Claude Code를, 어디서든">
      <button style="flex:0 0 auto" onclick="translateBanner(${i})">🌐 자동 번역</button>
    </div>
    <div class="row">
      <div><label>English</label><input data-k="en" value="${esc(t.en || '')}"></div>
      <div><label>日本語</label><input data-k="ja" value="${esc(t.ja || '')}"></div>
    </div>
    <div class="row">
      <div><label>中文</label><input data-k="zh" value="${esc(t.zh || '')}"></div>
      <div><label>Español</label><input data-k="es" value="${esc(t.es || '')}"></div>
    </div>
    <div class="row" style="align-items:end">
      <div><label>클릭 시 이동할 주소 (페이지·유튜브 영상 등) — '재부팅 버튼'을 켜면 이 주소는 무시됩니다</label><input data-k="url" value="${esc(b.url || '')}" ${b.reboot ? 'disabled' : ''}></div>
      <div style="flex:0 0 160px"><label>&nbsp;</label>
        <label style="display:flex;align-items:center;gap:6px;font-size:12.5px;cursor:pointer;padding:9px 10px;background:#111827;border:1px solid var(--line);border-radius:8px">
          <input type="checkbox" data-k="reboot" ${b.reboot ? 'checked' : ''} style="width:auto"> 🔄 재부팅 버튼
        </label>
      </div>
    </div>
    <div class="row" style="align-items:end">
      <div style="flex:0 0 110px"><label>배경색</label><input type="color" data-k="color" value="${/^#[0-9a-fA-F]{6}$/.test(b.color || '') ? b.color : '#EC4899'}" style="height:40px;padding:2px;cursor:pointer"></div>
      <div style="flex:0 0 150px"><label>✨ 효과 (전 사용자 원격 적용)</label>
        <select data-k="effect">
          ${['none','blink','pulse','glow','shake','slide','rainbow'].map(fx =>
            `<option value="${fx}" ${((b.effect || 'none') === fx) ? 'selected' : ''}>${
              ({none:'없음',blink:'깜빡임',pulse:'두근두근',glow:'네온 빛',shake:'흔들림',slide:'흐르는 글자',rainbow:'무지개'})[fx]
            }</option>`).join('')}
        </select>
      </div>
    </div>
    <label>이미지 주소 (선택 — 배너 안에 작은 로고/아이콘으로 표시)</label>
    <input data-k="image" value="${esc(b.image || '')}" placeholder="https://.../logo.png">
    <div style="text-align:right;margin-top:8px"><button class="danger" onclick="delBanner(${i})">✕ 이 배너 삭제</button></div>`;
  d.querySelectorAll('input:not([type=checkbox])').forEach(inp => inp.addEventListener('input', () => { collect(); preview(); }));
  d.querySelectorAll('input[type=checkbox]').forEach(inp => inp.addEventListener('change', () => { collect(); render(); }));   // 재부팅 체크 시 URL칸 활성/비활성 갱신 위해 전체 재렌더
  d.querySelectorAll('select').forEach(sel => sel.addEventListener('change', () => { collect(); preview(); }));
  return d;
}

function render() {
  const wrap = document.getElementById('banners');
  wrap.innerHTML = '';
  data.banners.forEach((b, i) => wrap.appendChild(bannerCard(b, i)));
  document.getElementById('latestVersion').value = data.latestVersion || '';
  document.getElementById('updateUrl').value = data.updateUrl || '';
  document.getElementById('feedbackUrl').value = data.feedbackUrl || '';
  preview();
}
function collect() {
  const cards = [...document.querySelectorAll('#banners .card')];
  data.banners = cards.map(c => {
    const v = k => { const el = c.querySelector(`[data-k="${k}"]`); return el ? el.value.trim() : ''; };
    const vc = k => { const el = c.querySelector(`[data-k="${k}"]`); return el ? el.checked : false; };
    const b = { text: { ko: v('ko'), en: v('en'), ja: v('ja'), zh: v('zh'), es: v('es') }, url: v('url') };
    if (v('color')) b.color = v('color');
    if (v('image')) b.image = v('image');
    if (v('effect') && v('effect') !== 'none') b.effect = v('effect');
    if (vc('reboot')) b.reboot = true;
    return b;
  }).filter(b => Object.values(b.text).some(x => x));
  data.latestVersion = document.getElementById('latestVersion').value.trim();
  data.updateUrl = document.getElementById('updateUrl').value.trim();
  data.feedbackUrl = document.getElementById('feedbackUrl').value.trim();
}
// 한국어 문구를 영·일·중·스페인어로 자동 번역해서 채움
async function translateBanner(i) {
  collect();
  const ko = (data.banners[i] && data.banners[i].text.ko || '').trim();
  if (!ko) { alert('먼저 한국어 문구를 입력하세요.'); return; }
  const targets = { en: 'en', ja: 'ja', zh: 'zh-CN', es: 'es' };
  const st = document.getElementById('status');
  st.textContent = '🌐 번역 중...';
  let okCount = 0, lastErr = '';
  for (const [key, code] of Object.entries(targets)) {
    try {
      const r = await api('GET', '/api/admin/translate?text=' + encodeURIComponent(ko) + '&to=' + code);
      if (r && r.text) { data.banners[i].text[key] = r.text; okCount++; }
      else lastErr = (r && r.error) || '응답 없음';
    } catch (e) { lastErr = '서버에 번역 기능이 없습니다 — PowerTerminal을 재시작(최신 업데이트)한 뒤 다시 시도하세요.'; }
  }
  st.textContent = okCount
    ? `✅ ${okCount}개 언어 번역 완료 — 문구를 확인한 뒤 아래 [발행]을 누르세요.`
    : '❌ 번역 실패: ' + lastErr;
  render();
}
function preview() {
  const b = data.banners[0];
  for (const id of ['pvPC', 'pvMO']) {
    const el = document.getElementById(id);
    if (!b) { el.style.display = 'none'; continue; }
    el.style.display = 'inline-flex';
    el.innerHTML = (b.image ? `<img src="${esc(b.image)}">` : '') + `<span class="bn-in">${esc(b.text.ko || b.text.en)}</span>` + (b.reboot ? ` <small style="opacity:.75">(재부팅)</small>` : '');
    el.href = b.reboot ? 'javascript:void(0)' : (b.url || '#');
    el.style.background = b.color || '';
    el.className = 'pv-banner' + (b.effect ? ' fx-' + b.effect : '');   // 효과 실시간 미리보기
  }
}
// 새 배너 기본값: 재부팅 버튼 체크 + 흐르는 글자 (원하면 카드에서 끄면 됨)
function addBanner() { collect(); data.banners.push({ text: { ko: '', en: '' }, url: '', reboot: true, effect: 'slide' }); render(); }
function delBanner(i) { collect(); data.banners.splice(i, 1); render(); }
function esc(s) { return (s || '').replace(/</g, '&lt;').replace(/"/g, '&quot;'); }

async function load() {
  data = await api('GET', '/api/banner');
  if (!data.banners) data.banners = [];
  render();
  try { const inf = await api('GET', '/api/info'); document.getElementById('verBadge').textContent = '실행 중 v' + inf.version; } catch (e) {}
  // 관리자 비밀번호 카드 — 이 PC(localhost)에서만 값이 내려옴, 원격에선 404/403이라 카드 숨김
  try {
    const r = await api('GET', '/api/admin/password');
    if (r && r.password) { document.getElementById('pwField').value = r.password; document.getElementById('pwCard').style.display = ''; }
  } catch (e) {}
  loadStats();
}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
async function loadStats() {
  const box = document.getElementById('statsBody');
  box.textContent = '불러오는 중… (GitHub 조회, 최대 15초)';
  let s; try { s = await api('GET', '/api/admin/stats'); } catch (e) { s = null; }
  if (!s || (!s.ok && !s.releases)) {
    box.innerHTML = '<span style="color:#f87171">' + esc((s && s.error) || 'GitHub 조회 실패 — 개발자 PC(gh 로그인)에서만 통계가 보입니다.') + '</span>';
    return;
  }
  const c = s.clones14 || {}, v = s.views14 || {};
  const big = (n, lab, sub) => `<div style="flex:1;min-width:120px;background:#111827;border:1px solid var(--line);border-radius:10px;padding:10px 12px">
      <div style="font-size:22px;font-weight:800;color:var(--fg)">${n==null?'—':n}</div>
      <div style="font-size:12px;color:var(--fg);margin-top:2px">${lab}</div>
      <div style="font-size:11px;color:var(--muted)">${sub||''}</div></div>`;
  let html = '<div style="display:flex;gap:8px;flex-wrap:wrap">'
    + big(c.uniques, '활성 기기 (14일)', '순 클론 — 실사용 기기에 가장 근접')
    + big(c.count, '설치·업데이트 (14일)', '총 클론 횟수')
    + big(v.uniques, '사이트 방문자 (14일)', '순 방문 ' + (v.count!=null?('· '+v.count+'회'):''))
    + big(s.downloadsTotal, 'ZIP 누적 다운로드', 'git 사용자는 미포함(하한선)')
    + '</div>';
  // 일자별 클론 미니 막대
  if (c.daily && c.daily.length) {
    const mx = Math.max(1, ...c.daily.map(d => d.count));
    html += '<div style="margin-top:12px"><div style="font-size:12px;color:var(--muted);margin-bottom:5px">일자별 설치·업데이트 (순 사용자)</div>'
      + '<div style="display:flex;align-items:flex-end;gap:3px;height:64px">'
      + c.daily.map(d => `<div title="${esc(d.date)} · ${d.count}회 · 순 ${d.uniques}명" style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:2px">
          <div style="width:100%;background:linear-gradient(180deg,var(--violet),var(--pink));border-radius:3px 3px 0 0;height:${Math.round(d.count/mx*46)}px"></div>
          <div style="font-size:8.5px;color:var(--muted)">${esc((d.date||'').slice(5))}</div></div>`).join('')
      + '</div></div>';
  }
  // 릴리스별 다운로드 (0 아닌 것 우선, 상위 8개)
  if (s.releases && s.releases.length) {
    const rel = s.releases.slice(0, 12);
    html += '<div style="margin-top:12px"><div style="font-size:12px;color:var(--muted);margin-bottom:5px">릴리스별 ZIP 다운로드 (최근)</div>'
      + '<div style="display:flex;flex-wrap:wrap;gap:5px">'
      + rel.map(r => `<span style="font-size:11px;background:#111827;border:1px solid var(--line);border-radius:7px;padding:3px 8px">${esc(r.tag)} <b style="color:${r.dl?'#a3e635':'var(--muted)'}">${r.dl}</b></span>`).join('')
      + '</div></div>';
  }
  html += `<div style="font-size:11px;color:var(--muted);margin-top:12px">
      · GitHub 트래픽은 최근 14일만 제공 · 10분 캐시 · 본인(개발자) 접속은 GitHub이 자동 제외<br>
      · 정확한 누적 순사용자 수는 추적 기능이 없어(사생활 존중) 셀 수 없습니다 — 활성 기기 수가 실사용 지표에 가장 가깝습니다.</div>`;
  box.innerHTML = html;
}
function copyPw() {
  const f = document.getElementById('pwField');
  f.select();
  navigator.clipboard && navigator.clipboard.writeText(f.value);
}
async function regenPw() {
  if (!confirm('비밀번호를 재발급할까요? 기존 비밀번호로 로그인해둔 다른 기기는 다시 입력해야 합니다.')) return;
  const r = await api('POST', '/api/admin/password/regenerate');
  if (r && r.password) document.getElementById('pwField').value = r.password;
}
async function publish() {
  collect();
  document.getElementById('status').textContent = '발행 중...';
  const r = await api('POST', '/api/admin/banner', data);
  document.getElementById('status').textContent =
      r.error   ? '❌ 실패: ' + r.error
    : r.warning ? '⚠ ' + r.warning
    :             '✅ 발행 완료 — 모든 사용자에게 10분 안에 반영됩니다.';
}
load();
</script>
</body>
</html>
